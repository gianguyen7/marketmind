polymarket:
  api_url: "https://clob.polymarket.com"
  gamma_api_url: "https://gamma-api.polymarket.com"
  data_api_url: "https://data-api.polymarket.com"
  markets_endpoint: "/markets"

  # Curated market registry (70 resolved binary markets)
  registry: "configs/markets.yaml"

  # Price history settings
  # NOTE: resolved markets only return data at fidelity >= 720 (12h)
  price_history:
    fidelity: 720  # minutes — use 720+ for resolved markets
    interval: "max"

  # Snapshot settings
  snapshots:
    interval_hours: 12  # matches fidelity=720
    min_snapshots_per_market: 5

data_pipeline:
  raw_dir: "data/raw"
  interim_dir: "data/interim"
  processed_dir: "data/processed"
  external_dir: "data/external"

dataset:
  target_col: "resolved_yes"
  time_col: "snapshot_ts"
  market_id_col: "condition_id"
  meeting_id_col: "meeting_date"  # for grouping Fed rate variants
  # Temporal split — train on 2024 meetings, test on 2025+
  train_cutoff: "2025-01-01"
  test_cutoff: "2025-07-01"
