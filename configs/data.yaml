polymarket:
  api_url: "https://clob.polymarket.com"
  gamma_api_url: "https://gamma-api.polymarket.com"
  data_api_url: "https://data-api.polymarket.com"
  markets_endpoint: "/markets"

  # Curated market registry (70 resolved binary markets)
  registry: "configs/markets.yaml"

  # Price history settings
  # NOTE: resolved markets only return data at fidelity >= 720 (12h)
  price_history:
    fidelity: 720  # minutes — use 720+ for resolved markets
    interval: "max"

  # Snapshot settings
  snapshots:
    interval_hours: 12  # matches fidelity=720
    min_snapshots_per_market: 5

  # Resilience settings
  retry:
    max_retries: 3
    base_delay_sec: 1.0       # exponential backoff: delay * 2^attempt
    max_delay_sec: 30.0
    retry_on_status: [429, 500, 502, 503, 504]
  rate_limit:
    delay_between_requests_sec: 0.4   # polite crawl delay
  checkpoint:
    enabled: true
    path: "data/raw/.checkpoint_snapshots.json"

  # Bulk fetch from Gamma API (Track B1 — data expansion).
  # Used by src/data/fetch_gamma.py and the --gamma-fetch flag in
  # scripts/run_data_pipeline.py. The existing curated-registry pipeline
  # still runs unchanged when --gamma-fetch is not passed.
  gamma_fetch:
    min_volume_usd: 1000000      # only fetch markets with >= $1M lifetime volume
    binary_only: true             # require len(outcomes) == 2
    closed_only: true             # only fetch resolved markets
    max_markets: 5000             # safety cap; set lower via --max-markets
    checkpoint_path: "data/raw/.checkpoint_gamma_snapshots.json"
    # Dry-run scratch path — used when --dry-run is passed. Never writes to
    # data/raw/gamma_*.parquet in dry-run mode.
    dry_run_dir: "data/raw/scratch"

data_pipeline:
  raw_dir: "data/raw"
  interim_dir: "data/interim"
  processed_dir: "data/processed"
  external_dir: "data/external"
  duckdb_path: "data/marketmind.duckdb"

dataset:
  target_col: "resolved_yes"
  time_col: "snapshot_ts"
  market_id_col: "condition_id"
  meeting_id_col: "meeting_date"  # for grouping Fed rate variants

  # Event-group temporal split — correlated markets stay together
  split:
    strategy: "event_group_temporal"
    train_frac: 0.6
    val_frac: 0.2
    # test gets the remainder (~0.2)
