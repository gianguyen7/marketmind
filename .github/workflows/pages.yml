name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'src/dashboard/**'
      - 'outputs/tables/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir -p _site
          cp -r src/dashboard/* _site/
          mkdir -p _site/data
          cp outputs/tables/*.csv _site/data/ 2>/dev/null || true
          cp outputs/tables/*.json _site/data/ 2>/dev/null || true
          # Rewrite data paths for Pages (flat structure)
          sed -i "s|../../outputs/tables|./data|g" _site/index.html
          sed -i "s|../../outputs/tables|./data|g" _site/one-pager.html
          sed -i "s|../../outputs/tables|./data|g" _site/Pages.jsx
          sed -i "s|../../outputs/tables|./data|g" _site/DataLoader.jsx

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
